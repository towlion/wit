services:
  app:
    build:
      context: ..
      dockerfile: app/Dockerfile
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
      - /app/__pycache__
    restart: unless-stopped
    networks:
      - towlion
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - towlion
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  towlion:
    external: true
